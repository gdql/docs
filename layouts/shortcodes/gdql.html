{{- $raw := trim .Inner "\n " -}}
{{- $b64 := $raw | base64Encode -}}
{{- $b64url := replace (replace (replace $b64 "+" "-") "/" "_") "=" "" -}}
{{- $url := printf "https://sandbox.gdql.dev?q=%s&run=1" $b64url -}}
<div class="gdql-wrap">
<div class="gdql-block">
<div class="gdql-bar"><span class="gdql-dot gdql-dot-red"></span><span class="gdql-dot gdql-dot-yellow"></span><span class="gdql-dot gdql-dot-green"></span></div><pre><code class="language-gdql">{{- $raw -}}</code></pre>
</div>
<a href="{{ $url }}" rel="noopener noreferrer" target="_blank" class="gdql-try-link" title="Run in sandbox">▶ Try it in sandbox →</a>
</div>
